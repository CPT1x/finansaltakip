  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body,#root{height:100%;width:100%;background:#0a0c10;font-family:'DM Sans',-apple-system,sans-serif;color:#fff;overflow-x:hidden;-webkit-font-smoothing:antialiased}

    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    input:focus{border-color:rgba(34,197,94,0.5)!important;outline:none}
    button:active{opacity:0.7!important}
    ::-webkit-scrollbar{display:none}
    input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
    input[type=number]{-moz-appearance:textfield}
    input[type=date]{-webkit-appearance:none}
    input[type=date]::-webkit-date-and-time-value{text-align:left}
    @media all and (display-mode:standalone){body{padding-top:max(env(safe-area-inset-top),20px)}}
  </style>
</head>
<body>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script>
  if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('/sw.js').catch(()=>{});})}
  const{useState,useEffect,createElement:h}=React;const e=h;
  const STORAGE_KEY='finans-dashboard-v3';
  function loadData(){try{const r=localStorage.getItem(STORAGE_KEY);return r?JSON.parse(r):null}catch{return null}}
  function saveData(d){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(d))}catch{}}
  const today=()=>new Date().toISOString().split('T')[0];

        {id:3,ad:"Freelance",tutar:4500,tarih:"2026-01-15"}
      ],
      giderler:[
        {id:1,ad:"Konut Kredisi",tutar:21360,tarih:"2026-01-01"},

        {id:3,ad:"Fatura",tutar:1800,tarih:"2026-01-20"}

  };

  const defaultSettings={hedef:1000000,usdKur:43.92};
  const fmt=n=>n>=1000000?(n/1000000).toFixed(1)+'M':n.toLocaleString('tr-TR');
  const fmtFull=n=>n.toLocaleString('tr-TR');
  const monthNames=["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];
  const shortMonths=["Oca","Şub","Mar","Nis","May","Haz","Tem","Ağu","Eyl","Eki","Kas","Ara"];
  const getMonthLabel=key=>{const[y,m]=key.split('-');return monthNames[parseInt(m)-1]+" '"+y.slice(2)};
  const sum=arr=>arr.reduce((a,b)=>a+b.tutar,0);
  const fmtDate=d=>{if(!d)return'';const[y,m,day]=d.split('-');return parseInt(day)+' '+shortMonths[parseInt(m)-1]};

  function Icon({type,size=22,sw=1.8}){
    const p={xmlns:"http://www.w3.org/2000/svg",width:size,height:size,fill:"none",viewBox:"0 0 24 24",stroke:"currentColor",strokeWidth:sw};
    const i={
      wallet:e('svg',p,e('path',{strokeLinecap:"round",strokeLinejoin:"round",d:"M21 12V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2h14a2 2 0 002-2v-5zm-5 1a1 1 0 100-2 1 1 0 000 2z"})),
      percent:e('svg',p,e('circle',{cx:8,cy:8,r:2.5}),e('circle',{cx:16,cy:16,r:2.5}),e('path',{strokeLinecap:"round",d:"M19 5L5 19"})),
      trending:e('svg',p,e('path',{strokeLinecap:"round",strokeLinejoin:"round",d:"M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"})),
      portfolio:e('svg',p,e('path',{strokeLinecap:"round",strokeLinejoin:"round",d:"M20 7H4a1 1 0 00-1 1v10a1 1 0 001 1h16a1 1 0 001-1V8a1 1 0 00-1-1zM16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"})),
      plus:e('svg',{...p,width:16,height:16,strokeWidth:2.5},e('path',{strokeLinecap:"round",d:"M12 5v14M5 12h14"})),
      close:e('svg',{...p,width:18,height:18,strokeWidth:2.5},e('path',{strokeLinecap:"round",d:"M18 6L6 18M6 6l12 12"})),
      trash:e('svg',{...p,width:16,height:16,strokeWidth:2},e('path',{strokeLinecap:"round",strokeLinejoin:"round",d:"M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"})),
      edit:e('svg',{...p,width:14,height:14,strokeWidth:2},e('path',{strokeLinecap:"round",strokeLinejoin:"round",d:"M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"})),
      chevLeft:e('svg',{...p,width:18,height:18,strokeWidth:2.5},e('path',{strokeLinecap:"round",strokeLinejoin:"round",d:"M15 19l-7-7 7-7"})),
      chevRight:e('svg',{...p,width:18,height:18,strokeWidth:2.5},e('path',{strokeLinecap:"round",strokeLinejoin:"round",d:"M9 5l7 7-7 7"})),
      calendar:e('svg',{...p,width:16,height:16,strokeWidth:2},e('rect',{x:3,y:4,width:18,height:18,rx:2}),e('path',{d:"M16 2v4M8 2v4M3 10h18"})),
      target:e('svg',{...p,width:16,height:16,strokeWidth:2},e('circle',{cx:12,cy:12,r:10}),e('circle',{cx:12,cy:12,r:6}),e('circle',{cx:12,cy:12,r:2})),
      home:e('svg',{...p,width:20,height:20,strokeWidth:2},e('path',{strokeLinecap:"round",strokeLinejoin:"round",d:"M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z"})),
      chart:e('svg',{...p,width:20,height:20,strokeWidth:2},e('path',{strokeLinecap:"round",strokeLinejoin:"round",d:"M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"})),
      settings:e('svg',{...p,width:20,height:20,strokeWidth:2},e('path',{strokeLinecap:"round",strokeLinejoin:"round",d:"M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"}),e('circle',{cx:12,cy:12,r:3}))
    };
    return i[type]||null;
  }

  function Modal({isOpen,onClose,title,children}){
    if(!isOpen)return null;
    return e('div',{onClick:onClose,style:{position:'fixed',inset:0,zIndex:1000,display:'flex',alignItems:'flex-end',justifyContent:'center',background:'rgba(0,0,0,0.6)',backdropFilter:'blur(4px)',animation:'fadeIn 0.2s ease'}},
      e('div',{onClick:ev=>ev.stopPropagation(),style:{background:'#1a1d23',borderRadius:'20px 20px 0 0',padding:'24px',width:'100%',maxWidth:480,maxHeight:'80vh',overflow:'auto',border:'1px solid rgba(255,255,255,0.1)',boxShadow:'0 -8px 32px rgba(0,0,0,0.4)',animation:'slideUp 0.25s ease',paddingBottom:'calc(24px + env(safe-area-inset-bottom))'}},
        e('div',{style:{width:40,height:4,background:'rgba(255,255,255,0.2)',borderRadius:2,margin:'0 auto 16px'}}),
        e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}},
          e('h3',{style:{margin:0,fontSize:18,fontWeight:700,color:'#fff'}},title),
          e('button',{onClick:onClose,style:{background:'rgba(255,255,255,0.08)',border:'none',borderRadius:8,padding:6,cursor:'pointer',color:'#999',display:'flex'}},e(Icon,{type:'close'}))
        ),children
      )
    );
  }

  function ItemRow({item,onDelete,onEdit,color}){
    return e('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 0',borderBottom:'1px solid rgba(255,255,255,0.04)'}},
      e('div',{style:{display:'flex',alignItems:'center',gap:10,flex:1,minWidth:0}},
        e('div',{style:{width:4,height:4,borderRadius:'50%',background:color,opacity:0.6,flexShrink:0}}),
        e('div',{style:{display:'flex',flexDirection:'column',gap:1,minWidth:0}},
          e('span',{style:{color:'#ccc',fontSize:14,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}},item.ad),
          item.tarih?e('span',{style:{color:'#555',fontSize:11,fontWeight:500,display:'flex',alignItems:'center',gap:3}},
            e('svg',{xmlns:"http://www.w3.org/2000/svg",width:10,height:10,fill:"none",viewBox:"0 0 24 24",stroke:"currentColor",strokeWidth:2},e('rect',{x:3,y:4,width:18,height:18,rx:2}),e('path',{d:"M16 2v4M8 2v4M3 10h18"})),
            fmtDate(item.tarih)
          ):null
        )
      ),
      e('div',{style:{display:'flex',alignItems:'center',gap:6,flexShrink:0}},
        e('span',{style:{color:'#fff',fontSize:14,fontWeight:600,fontVariantNumeric:'tabular-nums'}},'\u20BA'+fmtFull(item.tutar)),
        e('button',{onClick:()=>onEdit(item),style:{background:'none',border:'none',cursor:'pointer',color:'#555',padding:5,display:'flex',borderRadius:4}},e(Icon,{type:'edit'})),
        e('button',{onClick:()=>onDelete(item.id),style:{background:'none',border:'none',cursor:'pointer',color:'#555',padding:5,display:'flex',borderRadius:4}},e(Icon,{type:'trash'}))
      )
    );
  }

  function SectionCard({title,items,color,gradient,onAdd,onDelete,onEdit}){
    const[expanded,setExpanded]=useState(false);
    const sorted=[...items].sort((a,b)=>(b.tarih||'').localeCompare(a.tarih||''));
    const displayItems=expanded?sorted:sorted.slice(0,5);
    const total=sum(items);
    return e('div',{style:{background:'#12141a',borderRadius:16,border:'1px solid rgba(255,255,255,0.06)',overflow:'hidden'}},
      e('div',{style:{background:gradient,padding:'14px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}},
        e('span',{style:{fontSize:12,fontWeight:800,letterSpacing:1.5,color:'#fff',textTransform:'uppercase'}},title),
        e('button',{onClick:onAdd,style:{background:'rgba(255,255,255,0.2)',border:'1px solid rgba(255,255,255,0.3)',borderRadius:8,padding:'5px 12px',cursor:'pointer',display:'flex',alignItems:'center',gap:4,color:'#fff',fontSize:11,fontWeight:700}},e(Icon,{type:'plus'}),' EKLE')
      ),
      e('div',{style:{padding:'4px 16px'}},...displayItems.map(item=>e(ItemRow,{key:item.id,item,onDelete,onEdit,color}))),
      items.length>5?e('button',{onClick:()=>setExpanded(!expanded),style:{width:'calc(100% - 32px)',margin:'8px 16px',padding:'10px',background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:10,color:'#888',fontSize:12,fontWeight:600,cursor:'pointer',letterSpacing:0.5}},expanded?'DARALT':'TÜMÜNÜ GÖSTER ('+items.length+')'):null,
      e('div',{style:{padding:'14px 16px',borderTop:'1px solid rgba(255,255,255,0.06)',display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:4}},
        e('span',{style:{color:'#888',fontSize:13,fontWeight:600}},'Toplam'),
        e('span',{style:{color,fontSize:16,fontWeight:800,fontVariantNumeric:'tabular-nums'}},'\u20BA'+fmtFull(total))
      )
    );
  }

  function StatCard({label,value,prefix,change,borderColor,accentColor,icon,subValue}){
    return e('div',{style:{background:'#12141a',borderRadius:14,padding:'16px',border:'1px solid rgba(255,255,255,0.06)',borderTop:'3px solid '+borderColor,minWidth:0,flex:'1 1 45%',position:'relative',overflow:'hidden'}},
      e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}},
        e('span',{style:{fontSize:10,fontWeight:800,letterSpacing:1.2,color:accentColor,textTransform:'uppercase'}},label),
        change!==undefined?e('span',{style:{fontSize:10,fontWeight:700,color:String(change).includes('-')?'#ef4444':'#22c55e',background:String(change).includes('-')?'rgba(239,68,68,0.1)':'rgba(34,197,94,0.1)',padding:'2px 6px',borderRadius:6}},change):null
      ),
      e('div',{style:{display:'flex',alignItems:'baseline',gap:2}},
        prefix?e('span',{style:{color:'#fff',fontSize:18,fontWeight:800}},prefix):null,
        e('span',{style:{color:'#fff',fontSize:24,fontWeight:800,fontVariantNumeric:'tabular-nums',lineHeight:1.1}},value)
      ),
      subValue?e('span',{style:{color:'#22c55e',fontSize:11,fontWeight:600,marginTop:4,display:'block'}},subValue):null,
      e('div',{style:{position:'absolute',right:12,bottom:12,color:borderColor,opacity:0.2}},e(Icon,{type:icon,size:28}))
    );
  }

  function ItemForm({onSubmit,onClose,initial}){
    const[ad,setAd]=useState(initial?initial.ad:'');
    const[tutar,setTutar]=useState(initial?String(initial.tutar):'');
    const[tarih,setTarih]=useState(initial&&initial.tarih?initial.tarih:today());
    const is={width:'100%',padding:'14px',background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.12)',borderRadius:12,color:'#fff',fontSize:16,boxSizing:'border-box'};
    return e('div',{style:{display:'flex',flexDirection:'column',gap:14}},
      e('div',null,
        e('label',{style:{color:'#888',fontSize:12,fontWeight:600,marginBottom:6,display:'block'}},'Açıklama'),
        e('input',{value:ad,onChange:ev=>setAd(ev.target.value),placeholder:'Örn: Maaş, Kira...',style:is})
      ),
      e('div',null,
        e('label',{style:{color:'#888',fontSize:12,fontWeight:600,marginBottom:6,display:'block'}},'Tutar (₺)'),
        e('input',{value:tutar,onChange:ev=>setTutar(ev.target.value),placeholder:'0',type:'number',inputMode:'numeric',style:is})
      ),
      e('div',null,
        e('label',{style:{color:'#888',fontSize:12,fontWeight:600,marginBottom:6,display:'block'}},'Tarih'),
        e('input',{value:tarih,onChange:ev=>setTarih(ev.target.value),type:'date',style:{...is,colorScheme:'dark'}})
      ),
      e('button',{onClick:()=>{if(!ad.trim()||!tutar.trim())return;onSubmit({ad:ad.trim(),tutar:parseFloat(tutar.replace(/[.,]/g,''))||0,tarih:tarih||today()});onClose()},style:{padding:'16px',background:'linear-gradient(135deg,#22c55e,#16a34a)',border:'none',borderRadius:12,color:'#fff',fontSize:16,fontWeight:700,cursor:'pointer',marginTop:4}},initial?'Güncelle':'Ekle')
    );
  }

  function App(){
    const[months,setMonths]=useState(defaultMonths);
    const[settings,setSettings]=useState(defaultSettings);
    const[currentMonth,setCurrentMonth]=useState('2026-02');
    const[loaded,setLoaded]=useState(false);
    const[activeTab,setActiveTab]=useState('anasayfa');
    const[modal,setModal]=useState(null);

    useEffect(()=>{const d=loadData();if(d&&d.months)setMonths(d.months);if(d&&d.settings)setSettings(d.settings);if(d&&d.currentMonth)setCurrentMonth(d.currentMonth);setLoaded(true)},[]);
    useEffect(()=>{if(loaded)saveData({months,settings,currentMonth})},[months,settings,currentMonth,loaded]);

    const data=months[currentMonth]||{gelirler:[],giderler:[],portfoy:[]};
    const totalGelir=sum(data.gelirler),totalGider=sum(data.giderler),totalPortfoy=sum(data.portfoy);
    const tasarruf=totalGelir-totalGider,tasarrufOrani=totalGelir>0?(tasarruf/totalGelir)*100:0,hedefOrani=(totalPortfoy/settings.hedef)*100;
    const sortedKeys=Object.keys(months).sort();
    const currentIdx=sortedKeys.indexOf(currentMonth);
    const prevMonthKey=currentIdx>0?sortedKeys[currentIdx-1]:null;
    const prevData=prevMonthKey?months[prevMonthKey]:null;
    const prevPortfoy=prevData?sum(prevData.portfoy):0;
    const buyumeOrani=prevPortfoy>0?((totalPortfoy-prevPortfoy)/prevPortfoy)*100:0;
    const portfoyDegisim=totalPortfoy-prevPortfoy;
    const prevTasarruf=prevData?sum(prevData.gelirler)-sum(prevData.giderler):0;
    const tasarrufDegisim=tasarruf-prevTasarruf;

    const addItem=(section,item)=>{setMonths(prev=>{const m={...prev},d={...m[currentMonth]},list=[...(d[section]||[])];list.push({...item,id:list.reduce((a,b)=>Math.max(a,b.id),0)+1});d[section]=list;m[currentMonth]=d;return m})};
    const editItem=(section,id,updates)=>{setMonths(prev=>{const m={...prev},d={...m[currentMonth]};d[section]=d[section].map(i=>i.id===id?{...i,...updates}:i);m[currentMonth]=d;return m})};
    const deleteItem=(section,id)=>{setMonths(prev=>{const m={...prev},d={...m[currentMonth]};d[section]=d[section].filter(i=>i.id!==id);m[currentMonth]=d;return m})};
    const addMonth=key=>{if(!months[key])setMonths(prev=>({...prev,[key]:{gelirler:[],giderler:[],portfoy:[]}}));setCurrentMonth(key)};
    const navigateMonth=dir=>{const[y,m]=currentMonth.split('-').map(Number);let ny=y,nm=m+dir;if(nm>12){nm=1;ny++}if(nm<1){nm=12;ny--}addMonth(ny+'-'+String(nm).padStart(2,'0'))};

    const tabs=[{id:'anasayfa',label:'Ana Sayfa',icon:'home'},{id:'veriler',label:'Veriler',icon:'chart'},{id:'ayarlar',label:'Ayarlar',icon:'settings'}];

    if(!loaded)return e('div',{style:{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#0a0c10'}},e('div',{style:{textAlign:'center'}},e('div',{style:{width:40,height:40,border:'3px solid rgba(255,255,255,0.1)',borderTopColor:'#22c55e',borderRadius:'50%',animation:'spin 0.8s linear infinite',margin:'0 auto 16px'}}),e('span',{style:{color:'#888',fontSize:14}},'Yükleniyor...')));

    function renderAnasayfa(){
      return e('div',{style:{animation:'fadeIn 0.3s ease'}},
        e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}},
          e(StatCard,{label:'Aylık Tasarruf',value:fmt(tasarruf),prefix:'₺',change:'₺'+fmtFull(tasarrufDegisim),borderColor:'#f59e0b',accentColor:'#f59e0b',icon:'wallet',subValue:'$'+(tasarruf/settings.usdKur).toFixed(0)}),
          e(StatCard,{label:'Tasarruf Oranı',value:tasarrufOrani.toFixed(1),prefix:'%',change:prevData?'%'+(tasarrufOrani-((sum(prevData.gelirler)-sum(prevData.giderler))/sum(prevData.gelirler)*100)).toFixed(1):undefined,borderColor:'#a855f7',accentColor:'#a855f7',icon:'percent'}),
          e(StatCard,{label:'Büyüme Oranı',value:buyumeOrani.toFixed(2),prefix:'%',change:prevData?'%'+buyumeOrani.toFixed(1):undefined,borderColor:'#ef4444',accentColor:'#ef4444',icon:'trending'}),
          e(StatCard,{label:'Portföy',value:fmt(totalPortfoy),prefix:'₺',change:portfoyDegisim!==0?'₺'+fmtFull(portfoyDegisim):undefined,borderColor:'#06b6d4',accentColor:'#06b6d4',icon:'portfolio',subValue:'$'+(totalPortfoy/settings.usdKur).toFixed(0)})
        ),
        e('div',{style:{display:'flex',flexDirection:'column',gap:14}},
          e(SectionCard,{title:'Gelirler',items:data.gelirler,color:'#22c55e',gradient:'linear-gradient(135deg,#059669,#10b981)',onAdd:()=>setModal({type:'add',section:'gelirler'}),onDelete:id=>deleteItem('gelirler',id),onEdit:item=>setModal({type:'edit',section:'gelirler',item})}),
          e(SectionCard,{title:'Giderler',items:data.giderler,color:'#ef4444',gradient:'linear-gradient(135deg,#dc2626,#ef4444)',onAdd:()=>setModal({type:'add',section:'giderler'}),onDelete:id=>deleteItem('giderler',id),onEdit:item=>setModal({type:'edit',section:'giderler',item})}),
          e(SectionCard,{title:'Portföy',items:data.portfoy,color:'#3b82f6',gradient:'linear-gradient(135deg,#1d4ed8,#3b82f6)',onAdd:()=>setModal({type:'add',section:'portfoy'}),onDelete:id=>deleteItem('portfoy',id),onEdit:item=>setModal({type:'edit',section:'portfoy',item})})
        )
      );
    }

    function renderVeriler(){
      return e('div',{style:{animation:'fadeIn 0.3s ease'}},
        e('h3',{style:{fontSize:16,fontWeight:700,marginBottom:16,color:'#fff'}},'Aylık Karşılaştırma'),
        ...sortedKeys.sort().reverse().map(key=>{
          const d=months[key],g=sum(d.gelirler),ex=sum(d.giderler),p=sum(d.portfoy),isActive=key===currentMonth;
          return e('div',{key,onClick:()=>{setCurrentMonth(key);setActiveTab('anasayfa')},style:{background:isActive?'rgba(34,197,94,0.08)':'rgba(255,255,255,0.03)',border:'1px solid '+(isActive?'rgba(34,197,94,0.3)':'rgba(255,255,255,0.06)'),borderRadius:14,padding:16,marginBottom:10,cursor:'pointer'}},
            e('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:10}},e('span',{style:{fontWeight:700,fontSize:15,color:isActive?'#22c55e':'#fff'}},getMonthLabel(key)),e(Icon,{type:'chevRight',size:14})),
            e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}},
              e('div',null,e('div',{style:{fontSize:10,color:'#888',marginBottom:2}},'Gelir'),e('div',{style:{fontSize:13,fontWeight:700,color:'#22c55e'}},'₺'+fmt(g))),
              e('div',null,e('div',{style:{fontSize:10,color:'#888',marginBottom:2}},'Gider'),e('div',{style:{fontSize:13,fontWeight:700,color:'#ef4444'}},'₺'+fmt(ex))),
              e('div',null,e('div',{style:{fontSize:10,color:'#888',marginBottom:2}},'Portföy'),e('div',{style:{fontSize:13,fontWeight:700,color:'#3b82f6'}},'₺'+fmt(p)))
            )
          );
        })
      );
    }

    function renderAyarlar(){
      const is={width:'100%',padding:'14px',background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.12)',borderRadius:12,color:'#fff',fontSize:16,boxSizing:'border-box'};
      return e('div',{style:{animation:'fadeIn 0.3s ease'}},
        e('h3',{style:{fontSize:16,fontWeight:700,marginBottom:16,color:'#fff'}},'Ayarlar'),
        e('div',{style:{background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.06)',borderRadius:14,padding:20,display:'flex',flexDirection:'column',gap:16}},
          e('div',null,e('label',{style:{color:'#888',fontSize:12,fontWeight:600,marginBottom:6,display:'block'}},'Hedef Tutarı (₺)'),e('input',{value:settings.hedef,onChange:ev=>setSettings(s=>({...s,hedef:Number(ev.target.value)||0})),type:'number',inputMode:'numeric',style:is})),
          e('div',null,e('label',{style:{color:'#888',fontSize:12,fontWeight:600,marginBottom:6,display:'block'}},'USD Kuru'),e('input',{value:settings.usdKur,onChange:ev=>setSettings(s=>({...s,usdKur:Number(ev.target.value)||0})),type:'number',step:'0.01',inputMode:'decimal',style:is})),
          e('div',{style:{borderTop:'1px solid rgba(255,255,255,0.06)',paddingTop:16,marginTop:4}},
            e('button',{onClick:()=>{if(confirm('Tüm verileri sıfırlamak istediğinizden emin misiniz?')){setMonths(defaultMonths);setSettings(defaultSettings);setCurrentMonth('2026-02')}},style:{width:'100%',padding:'14px',background:'rgba(239,68,68,0.1)',border:'1px solid rgba(239,68,68,0.3)',borderRadius:12,color:'#ef4444',fontSize:14,fontWeight:600,cursor:'pointer'}},'Verileri Sıfırla')
          )
        )
      );
    }

    return e('div',{style:{minHeight:'100vh',background:'#0a0c10',maxWidth:480,margin:'0 auto',paddingBottom:90,position:'relative'}},
      e('div',{style:{padding:'12px 16px 0',position:'sticky',top:0,zIndex:100,background:'linear-gradient(180deg,#0a0c10 85%,transparent)'}},
        e('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}},
          e('button',{onClick:()=>navigateMonth(-1),style:{background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:10,padding:8,cursor:'pointer',color:'#888',display:'flex'}},e(Icon,{type:'chevLeft'})),
          e('div',{style:{display:'flex',alignItems:'center',gap:8,background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:10,padding:'8px 16px'}},e('span',{style:{color:'#22c55e',display:'flex'}},e(Icon,{type:'calendar'})),e('span',{style:{fontSize:15,fontWeight:700,color:'#fff'}},getMonthLabel(currentMonth))),
          e('button',{onClick:()=>navigateMonth(1),style:{background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:10,padding:8,cursor:'pointer',color:'#888',display:'flex'}},e(Icon,{type:'chevRight'}))
        ),
        e('div',{style:{background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.06)',borderRadius:12,padding:'10px 14px',marginBottom:12,display:'flex',alignItems:'center',gap:12}},
          e('span',{style:{color:'#f59e0b',display:'flex'}},e(Icon,{type:'target'})),
          e('div',{style:{flex:1}},
            e('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:6}},e('span',{style:{fontSize:11,color:'#888',fontWeight:600}},'Hedef: ₺'+fmtFull(settings.hedef)),e('span',{style:{fontSize:12,color:'#f59e0b',fontWeight:700}},'%'+hedefOrani.toFixed(1))),
            e('div',{style:{height:6,background:'rgba(255,255,255,0.06)',borderRadius:3,overflow:'hidden'}},e('div',{style:{height:'100%',borderRadius:3,width:Math.min(hedefOrani,100)+'%',background:'linear-gradient(90deg,#f59e0b,#eab308)',transition:'width 0.8s ease'}}))
          ),
          e('span',{style:{fontSize:12,color:'#666',fontWeight:600}},'$'+settings.usdKur)
        )
      ),
      e('div',{style:{padding:'0 16px'}},activeTab==='anasayfa'?renderAnasayfa():activeTab==='veriler'?renderVeriler():renderAyarlar()),
      e('div',{style:{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:480,background:'linear-gradient(180deg,transparent,#0a0c10 20%)',paddingTop:20}},
        e('div',{style:{display:'flex',margin:'0 12px',marginBottom:'max(12px, env(safe-area-inset-bottom))',background:'#1a1d23',borderRadius:16,border:'1px solid rgba(255,255,255,0.08)',overflow:'hidden'}},
          ...tabs.map(tab=>{const isActive=activeTab===tab.id;return e('button',{key:tab.id,onClick:()=>setActiveTab(tab.id),style:{flex:1,padding:'12px 8px 14px',border:'none',cursor:'pointer',background:isActive?'rgba(34,197,94,0.12)':'transparent',color:isActive?'#22c55e':'#555',fontSize:11,fontWeight:isActive?700:500,display:'flex',flexDirection:'column',alignItems:'center',gap:4,position:'relative'}},e(Icon,{type:tab.icon,size:20}),tab.label,isActive?e('div',{style:{position:'absolute',bottom:0,left:'25%',right:'25%',height:2,background:'#22c55e',borderRadius:1}}):null)})
        )
      ),
      e(Modal,{isOpen:!!modal,onClose:()=>setModal(null),title:modal?(modal.type==='edit'?'Düzenle':'Yeni '+(modal.section==='gelirler'?'Gelir':modal.section==='giderler'?'Gider':'Portföy Kalemi')+' Ekle'):''},
        modal?e(ItemForm,{initial:modal.type==='edit'?modal.item:null,onClose:()=>setModal(null),onSubmit:item=>{if(modal.type==='edit')editItem(modal.section,modal.item.id,item);else addItem(modal.section,item)}}):null
      )
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(e(App));
  </script>
</body>
</html>
